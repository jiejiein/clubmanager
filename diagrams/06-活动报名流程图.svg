<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="720" fill="url(#bg6)" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">活动报名业务流程图</text>

  <!-- Start -->
  <ellipse cx="450" y="80" rx="50" ry="20" fill="#1e293b"/>
  <text x="450" y="85" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">开始</text>
  <line x1="450" y1="100" x2="450" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="350" y="130" width="200" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="155" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">用户选择活动，点击报名</text>
  <line x1="450" y1="170" x2="450" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 1: Is member? -->
  <polygon points="450,200 550,240 450,280 350,240" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="244" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">是社团成员？</text>

  <!-- No -->
  <line x1="550" y1="240" x2="700" y2="240" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="620" y="233" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">否</text>
  <rect x="700" y="220" width="150" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="775" y="245" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">提示：需先加入社团</text>

  <!-- Yes -->
  <line x1="450" y1="280" x2="450" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="300" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#10b981">是</text>

  <!-- Decision 2: Status published? -->
  <polygon points="450,310 550,350 450,390 350,350" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="346" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">活动已发布？</text>

  <!-- No -->
  <line x1="350" y1="350" x2="200" y2="350" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="343" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">否</text>
  <rect x="50" y="330" width="140" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="355" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">提示：活动未开放</text>

  <!-- Yes -->
  <line x1="450" y1="390" x2="450" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="410" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#10b981">是</text>

  <!-- Decision 3: Deadline -->
  <polygon points="450,420 550,460 450,500 350,460" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="450" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">未超过截止</text>
  <text x="450" y="466" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">时间？</text>

  <!-- No -->
  <line x1="350" y1="460" x2="200" y2="460" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="50" y="440" width="140" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="465" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">提示：报名已截止</text>

  <!-- Yes -->
  <line x1="450" y1="500" x2="450" y2="530" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision 4: Not full -->
  <polygon points="450,530 550,570 450,610 350,570" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="565" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">人数未满？</text>

  <!-- No -->
  <line x1="350" y1="570" x2="200" y2="570" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="50" y="550" width="140" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="575" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">提示：报名已满</text>

  <!-- Yes -->
  <line x1="450" y1="610" x2="450" y2="640" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Success -->
  <rect x="340" y="640" width="220" height="40" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b"></text>
  <text x="450" y="665" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#10b981">✅ 报名成功，创建报名记录</text>

  <!-- End -->
  <line x1="450" y1="680" x2="450" y2="700" stroke="#64748b" stroke-width="2"/>
  <ellipse cx="450" cy="708" rx="30" ry="12" fill="#1e293b"/>
  <text x="450" y="712" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="white">结束</text>
</svg>
