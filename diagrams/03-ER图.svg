<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="many" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M12,0 L0,4 L12,8" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="url(#bg3)" rx="12"/>
  <text x="500" y="35" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">数据库 E-R 图</text>

  <!-- ===== sys_user ===== -->
  <rect x="30" y="70" width="200" height="30" rx="6" fill="#3b82f6"/>
  <text x="130" y="90" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_user（用户表）</text>
  <rect x="30" y="100" width="200" height="140" rx="0 0 6 6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="45" y="122" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="45" y="140" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   username</text>
  <text x="45" y="158" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   password</text>
  <text x="45" y="176" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   nickname</text>
  <text x="45" y="194" font-family="Courier New, monospace" font-size="11" fill="#ef4444">   role (1/2/3)</text>
  <text x="45" y="212" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   status</text>
  <text x="45" y="230" font-family="Courier New, monospace" font-size="11" fill="#64748b">   student_no, college...</text>

  <!-- ===== sys_club ===== -->
  <rect x="290" y="70" width="210" height="30" rx="6" fill="#10b981"/>
  <text x="395" y="90" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_club（社团表）</text>
  <rect x="290" y="100" width="210" height="180" rx="0 0 6 6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="305" y="122" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="305" y="140" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   name</text>
  <text x="305" y="158" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 type_id (FK)</text>
  <text x="305" y="176" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   type_name</text>
  <text x="305" y="194" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 president_id (FK)</text>
  <text x="305" y="212" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   president_name</text>
  <text x="305" y="230" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   description</text>
  <text x="305" y="248" font-family="Courier New, monospace" font-size="11" fill="#ef4444">   status (0/1/2)</text>
  <text x="305" y="266" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   member_count</text>

  <!-- ===== sys_club_type ===== -->
  <rect x="290" y="330" width="210" height="30" rx="6" fill="#8b5cf6"/>
  <text x="395" y="350" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_club_type（社团类型）</text>
  <rect x="290" y="360" width="210" height="100" rx="0 0 6 6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="305" y="382" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="305" y="400" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   name</text>
  <text x="305" y="418" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   description</text>
  <text x="305" y="436" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   sort</text>

  <!-- ===== sys_club_member ===== -->
  <rect x="560" y="70" width="210" height="30" rx="6" fill="#f59e0b"/>
  <text x="665" y="90" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_club_member（成员表）</text>
  <rect x="560" y="100" width="210" height="140" rx="0 0 6 6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="575" y="122" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="575" y="140" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 club_id (FK)</text>
  <text x="575" y="158" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 user_id (FK)</text>
  <text x="575" y="176" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   user_name</text>
  <text x="575" y="194" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   status</text>
  <text x="575" y="212" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   join_time</text>
  <text x="590" y="232" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">（中间表：多对多）</text>

  <!-- ===== sys_activity ===== -->
  <rect x="560" y="290" width="210" height="30" rx="6" fill="#ec4899"/>
  <text x="665" y="310" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_activity（活动表）</text>
  <rect x="560" y="320" width="210" height="200" rx="0 0 6 6" fill="white" stroke="#ec4899" stroke-width="1.5"/>
  <text x="575" y="342" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="575" y="360" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 club_id (FK)</text>
  <text x="575" y="378" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   title</text>
  <text x="575" y="396" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   location</text>
  <text x="575" y="414" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   start_time / end_time</text>
  <text x="575" y="432" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   sign_up_start / end</text>
  <text x="575" y="450" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   max_participants</text>
  <text x="575" y="468" font-family="Courier New, monospace" font-size="11" fill="#ef4444">   status (0~5)</text>
  <text x="575" y="486" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   current_participants</text>

  <!-- ===== sys_activity_sign_up ===== -->
  <rect x="810" y="290" width="170" height="30" rx="6" fill="#6366f1"/>
  <text x="895" y="310" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="white">sys_activity_sign_up</text>
  <rect x="810" y="320" width="170" height="160" rx="0 0 6 6" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="825" y="342" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="825" y="360" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 activity_id</text>
  <text x="825" y="378" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 user_id (FK)</text>
  <text x="825" y="396" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   status</text>
  <text x="825" y="414" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   checked (0/1)</text>
  <text x="825" y="432" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   rating (1~5)</text>
  <text x="825" y="450" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   check_in_time</text>
  <text x="830" y="472" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">（报名+签到+评分）</text>

  <!-- ===== sys_apply ===== -->
  <rect x="30" y="330" width="200" height="30" rx="6" fill="#14b8a6"/>
  <text x="130" y="350" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_apply（入团申请）</text>
  <rect x="30" y="360" width="200" height="140" rx="0 0 6 6" fill="white" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="45" y="382" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="45" y="400" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 club_id (FK)</text>
  <text x="45" y="418" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 user_id (FK)</text>
  <text x="45" y="436" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   reason</text>
  <text x="45" y="454" font-family="Courier New, monospace" font-size="11" fill="#ef4444">   status (0/1/2)</text>
  <text x="45" y="472" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   reject_reason</text>

  <!-- ===== sys_notification ===== -->
  <rect x="30" y="540" width="200" height="30" rx="6" fill="#f97316"/>
  <text x="130" y="560" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_notification（通知）</text>
  <rect x="30" y="570" width="200" height="110" rx="0 0 6 6" fill="white" stroke="#f97316" stroke-width="1.5"/>
  <text x="45" y="592" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="45" y="610" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   title / content</text>
  <text x="45" y="628" font-family="Courier New, monospace" font-size="11" fill="#ef4444">   type (1系统/2社团)</text>
  <text x="45" y="646" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 target_id (FK→club)</text>
  <text x="45" y="664" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   priority (0/1/2)</text>

  <!-- ===== sys_payment ===== -->
  <rect x="290" y="540" width="210" height="30" rx="6" fill="#06b6d4"/>
  <text x="395" y="560" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_payment（缴费通知）</text>
  <rect x="290" y="570" width="210" height="110" rx="0 0 6 6" fill="white" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="305" y="592" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="305" y="610" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 club_id (FK)</text>
  <text x="305" y="628" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   title / amount</text>
  <text x="305" y="646" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   deadline</text>
  <text x="305" y="664" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   status</text>

  <!-- ===== sys_payment_record ===== -->
  <rect x="560" y="540" width="210" height="30" rx="6" fill="#06b6d4"/>
  <text x="665" y="560" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">sys_payment_record</text>
  <rect x="560" y="570" width="210" height="110" rx="0 0 6 6" fill="white" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="575" y="592" font-family="Courier New, monospace" font-size="11" fill="#1e293b">🔑 id (PK)</text>
  <text x="575" y="610" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 payment_id (FK)</text>
  <text x="575" y="628" font-family="Courier New, monospace" font-size="11" fill="#3b82f6">🔗 user_id (FK)</text>
  <text x="575" y="646" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   amount / status</text>
  <text x="575" y="664" font-family="Courier New, monospace" font-size="11" fill="#1e293b">   transaction_no</text>

  <!-- ===== Relationships (lines) ===== -->
  <!-- user → club (president) -->
  <line x1="230" y1="160" x2="290" y2="195" stroke="#64748b" stroke-width="1.5"/>
  <text x="250" y="165" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <!-- user ↔ club_member ↔ club -->
  <line x1="230" y1="170" x2="560" y2="150" stroke="#64748b" stroke-width="1.5"/>
  <line x1="500" y1="180" x2="560" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <text x="380" y="145" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">M:N</text>

  <!-- club_type → club -->
  <line x1="395" y1="330" x2="395" y2="280" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="310" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <!-- club → activity -->
  <line x1="500" y1="200" x2="560" y2="350" stroke="#64748b" stroke-width="1.5"/>
  <text x="510" y="280" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <!-- activity → sign_up -->
  <line x1="770" y1="380" x2="810" y2="380" stroke="#64748b" stroke-width="1.5"/>
  <text x="780" y="372" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <!-- user → apply → club -->
  <line x1="230" y1="200" x2="230" y2="390" stroke="#64748b" stroke-width="1.5"/>
  <line x1="230" y1="420" x2="290" y2="220" stroke="#64748b" stroke-width="1.5"/>
  <text x="238" y="310" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">M:N</text>

  <!-- club → notification -->
  <line x1="340" y1="280" x2="130" y2="540" stroke="#64748b" stroke-width="1.5"/>
  <text x="200" y="420" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <!-- club → payment → payment_record -->
  <line x1="400" y1="280" x2="395" y2="540" stroke="#64748b" stroke-width="1.5"/>
  <text x="405" y="410" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>
  <line x1="500" y1="600" x2="560" y2="600" stroke="#64748b" stroke-width="1.5"/>
  <text x="520" y="592" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#94a3b8">1:N</text>

  <text x="500" y="692" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">图 3-3 数据库 E-R 图（共 12 张表）</text>
</svg>
