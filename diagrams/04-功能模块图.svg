<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#bg4)" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">系统功能模块图</text>

  <!-- Center: System -->
  <rect x="350" y="60" width="200" height="50" rx="10" fill="#1e293b"/>
  <text x="450" y="90" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="white">高校社团管理平台</text>

  <!-- ===== Level 1 Modules ===== -->
  <!-- M1: 用户管理 -->
  <rect x="40" y="160" width="150" height="45" rx="8" fill="#3b82f6"/>
  <text x="115" y="187" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">用户管理模块</text>
  <line x1="350" y1="110" x2="115" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- M2: 社团管理 -->
  <rect x="220" y="160" width="150" height="45" rx="8" fill="#10b981"/>
  <text x="295" y="187" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">社团管理模块</text>
  <line x1="400" y1="110" x2="295" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- M3: 活动管理 -->
  <rect x="400" y="160" width="150" height="45" rx="8" fill="#ec4899"/>
  <text x="475" y="187" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">活动管理模块</text>
  <line x1="450" y1="110" x2="475" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- M4: 通知管理 -->
  <rect x="580" y="160" width="150" height="45" rx="8" fill="#f59e0b"/>
  <text x="655" y="187" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">通知管理模块</text>
  <line x1="500" y1="110" x2="655" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- M5: 缴费管理 -->
  <rect x="760" y="160" width="130" height="45" rx="8" fill="#06b6d4"/>
  <text x="825" y="187" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">缴费管理模块</text>
  <line x1="550" y1="110" x2="825" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== Level 2: Sub-modules ===== -->

  <!-- 用户管理子模块 -->
  <rect x="20" y="260" width="80" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">登录注册</text>
  <line x1="90" y1="205" x2="60" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="110" y="260" width="80" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">用户列表</text>
  <line x1="130" y1="205" x2="150" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="20" y="310" width="80" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">角色分配</text>
  <line x1="60" y1="295" x2="60" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <rect x="110" y="310" width="80" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">密码管理</text>
  <line x1="150" y1="295" x2="150" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <!-- 社团管理子模块 -->
  <rect x="210" y="260" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">社团CRUD</text>
  <line x1="260" y1="205" x2="250" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="300" y="260" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">社团审核</text>
  <line x1="310" y1="205" x2="340" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="210" y="310" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">类型管理</text>
  <line x1="250" y1="295" x2="250" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <rect x="300" y="310" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">成员管理</text>
  <line x1="340" y1="295" x2="340" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <rect x="210" y="360" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="382" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">入团申请</text>
  <line x1="250" y1="345" x2="250" y2="360" stroke="#94a3b8" stroke-width="1"/>

  <rect x="300" y="360" width="80" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="382" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">社长转移</text>
  <line x1="340" y1="345" x2="340" y2="360" stroke="#94a3b8" stroke-width="1"/>

  <!-- 活动管理子模块 -->
  <rect x="400" y="260" width="80" height="35" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="440" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">活动CRUD</text>
  <line x1="440" y1="205" x2="440" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="490" y="260" width="80" height="35" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="530" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">活动审核</text>
  <line x1="500" y1="205" x2="530" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="400" y="310" width="80" height="35" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">活动报名</text>
  <line x1="440" y1="295" x2="440" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <rect x="490" y="310" width="80" height="35" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="530" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">签到管理</text>
  <line x1="530" y1="295" x2="530" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <rect x="400" y="360" width="80" height="35" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">活动评分</text>
  <line x1="440" y1="345" x2="440" y2="360" stroke="#94a3b8" stroke-width="1"/>

  <!-- 通知管理子模块 -->
  <rect x="590" y="260" width="80" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="630" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">发布通知</text>
  <line x1="630" y1="205" x2="630" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="680" y="260" width="80" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="720" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">已读追踪</text>
  <line x1="680" y1="205" x2="720" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="590" y="310" width="80" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="630" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">通知管理</text>
  <line x1="630" y1="295" x2="630" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <!-- 缴费管理子模块 -->
  <rect x="770" y="260" width="80" height="35" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="282" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">缴费发布</text>
  <line x1="810" y1="205" x2="810" y2="260" stroke="#94a3b8" stroke-width="1"/>

  <rect x="770" y="310" width="80" height="35" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="332" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">缴费记录</text>
  <line x1="810" y1="295" x2="810" y2="310" stroke="#94a3b8" stroke-width="1"/>

  <!-- ===== Bottom: Infrastructure ===== -->
  <rect x="150" y="440" width="600" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="467" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#64748b">基础设施：数据看板 + 系统日志 + JWT认证 + 权限控制</text>

  <line x1="350" y1="110" x2="350" y2="130" stroke="#94a3b8" stroke-width="1"/>
  <line x1="350" y1="130" x2="450" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom label -->
  <text x="450" y="520" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">图 3-4 系统功能模块图</text>
</svg>
