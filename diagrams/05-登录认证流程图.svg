<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="url(#bg5)" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">登录认证流程图</text>

  <!-- ===== Swimlanes ===== -->
  <!-- Browser lane -->
  <rect x="40" y="60" width="250" height="600" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="165" y="85" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6">浏览器（前端）</text>

  <!-- Server lane -->
  <rect x="320" y="60" width="260" height="600" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="85" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#10b981">服务端（后端）</text>

  <!-- Database lane -->
  <rect x="610" y="60" width="250" height="600" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="85" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">数据库（MySQL）</text>

  <!-- ===== Flow Steps ===== -->
  <!-- Step 1 -->
  <rect x="70" y="120" width="190" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="142" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">① 用户输入账号密码</text>
  <text x="165" y="160" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">el-form 表单绑定</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="145" x2="320" y2="145" stroke="#64748b" stroke-width="2" marker-end="url(#arrow5)"/>
  <text x="290" y="138" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">POST /api/auth/login</text>
  <text x="290" y="155" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">{username, password}</text>

  <!-- Step 2 -->
  <rect x="350" y="120" width="200" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="142" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">② AuthController 接收</text>
  <text x="450" y="160" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">@PostMapping("/login")</text>

  <!-- Arrow 2→3 -->
  <line x1="550" y1="145" x2="610" y2="145" stroke="#64748b" stroke-width="2" marker-end="url(#arrow5)"/>
  <text x="580" y="138" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">SELECT * FROM</text>
  <text x="580" y="155" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">sys_user WHERE</text>
  <text x="580" y="168" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">username=?</text>

  <!-- Step 3 -->
  <rect x="640" y="120" width="190" height="50" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="735" y="142" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">③ 查询用户数据</text>
  <text x="735" y="160" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">userMapper.selectOne()</text>

  <!-- Arrow back -->
  <path d="M640,170 L640,220 L610,220" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrow5)"/>
  <text x="625" y="213" text-anchor="end" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">User 对象</text>

  <!-- Step 4 -->
  <rect x="350" y="200" width="200" height="70" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="220" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">④ 验证逻辑</text>
  <text x="450" y="238" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">用户存在？</text>
  <text x="450" y="252" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">密码正确？</text>
  <text x="450" y="266" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">账号未禁用？</text>

  <!-- Decision -->
  <polygon points="450,290 510,320 450,350 390,320" fill="white" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="325" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#1e293b">验证通过？</text>

  <!-- Failed path -->
  <line x1="390" y1="320" x2="300" y2="320" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="345" y="313" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#ef4444">失败</text>

  <rect x="100" y="300" width="170" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="185" y="325" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#ef4444">返回错误提示</text>
  <text x="185" y="337" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#64748b">{"code":500,"message":"密码错误"}</text>

  <!-- Success path down -->
  <line x1="450" y1="350" x2="450" y2="390" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="465" y="375" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#10b981">通过</text>

  <!-- Step 5: Generate JWT -->
  <rect x="350" y="390" width="200" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="412" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">⑤ 生成 JWT Token</text>
  <text x="450" y="428" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">jwtUtils.generateToken()</text>
  <text x="450" y="442" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#64748b">载荷: userId, username, role</text>

  <!-- Arrow back to browser -->
  <line x1="350" y1="420" x2="260" y2="420" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="305" y="413" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#94a3b8">{token, user}</text>

  <!-- Step 6: Save token -->
  <rect x="70" y="400" width="190" height="60" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="420" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">⑥ 保存 Token</text>
  <text x="165" y="438" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">localStorage.setItem()</text>
  <text x="165" y="452" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">Pinia 状态更新</text>

  <!-- Step 7: Redirect -->
  <rect x="70" y="490" width="190" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="512" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">⑦ 跳转首页</text>
  <text x="165" y="530" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">router.push('/dashboard')</text>

  <line x1="165" y1="460" x2="165" y2="490" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Step 8: Subsequent requests -->
  <rect x="70" y="570" width="190" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="165" y="590" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">⑧ 后续请求自动带 Token</text>
  <text x="165" y="608" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">Authorization: Bearer xxx</text>
  <text x="165" y="622" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">request.js 拦截器自动注入</text>

  <line x1="165" y1="540" x2="165" y2="570" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Step 9: Filter validates -->
  <rect x="350" y="570" width="200" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="590" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">⑨ JwtFilter 验证 Token</text>
  <text x="450" y="608" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">解析 userId → SecurityContext</text>
  <text x="450" y="622" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#64748b">后续代码直接获取当前用户</text>

  <line x1="260" y1="600" x2="350" y2="600" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Title note -->
  <text x="450" y="690" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">图 3-5 登录认证时序图</text>
</svg>
