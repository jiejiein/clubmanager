<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">系统架构图</text>

  <!-- Browser Layer -->
  <rect x="60" y="70" width="780" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="95" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#64748b">浏览器层 (Browser)</text>

  <!-- Browser boxes -->
  <rect x="90" y="110" width="160" height="50" rx="8" fill="url(#blue)"/>
  <text x="170" y="140" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="white">Vue 3 + Element Plus</text>

  <rect x="280" y="110" width="130" height="50" rx="8" fill="url(#blue)"/>
  <text x="345" y="140" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="white">Vue Router</text>

  <rect x="440" y="110" width="120" height="50" rx="8" fill="url(#blue)"/>
  <text x="500" y="140" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="white">Pinia</text>

  <rect x="590" y="110" width="120" height="50" rx="8" fill="url(#blue)"/>
  <text x="650" y="140" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="white">ECharts</text>

  <rect x="740" y="110" width="80" height="50" rx="8" fill="url(#blue)"/>
  <text x="780" y="140" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="white">Axios</text>

  <!-- Arrow down -->
  <line x1="450" y1="180" x2="450" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="200" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">HTTP / JSON</text>

  <!-- Server Layer -->
  <rect x="60" y="220" width="780" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="80" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#64748b">服务端层 (Spring Boot)</text>

  <rect x="90" y="260" width="130" height="55" rx="8" fill="url(#green)"/>
  <text x="155" y="283" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">Controller</text>
  <text x="155" y="299" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">接口层</text>

  <rect x="250" y="260" width="130" height="55" rx="8" fill="url(#green)"/>
  <text x="315" y="283" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">Service</text>
  <text x="315" y="299" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">业务层</text>

  <rect x="410" y="260" width="130" height="55" rx="8" fill="url(#green)"/>
  <text x="475" y="283" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">Mapper</text>
  <text x="475" y="299" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">数据访问层</text>

  <rect x="580" y="260" width="120" height="55" rx="8" fill="url(#purple)"/>
  <text x="640" y="283" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">Spring Security</text>
  <text x="640" y="299" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">+ JWT</text>

  <rect x="730" y="260" width="90" height="55" rx="8" fill="url(#purple)"/>
  <text x="775" y="283" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="white">AOP</text>
  <text x="775" y="299" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">日志切面</text>

  <!-- Arrow between layers -->
  <line x1="155" y1="290" x2="250" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="290" x2="410" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow down -->
  <line x1="450" y1="340" x2="450" y2="375" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="360" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">JDBC / SQL</text>

  <!-- Database Layer -->
  <rect x="60" y="380" width="780" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="80" y="405" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#64748b">数据层 (MySQL)</text>

  <rect x="90" y="420" width="100" height="50" rx="8" fill="url(#orange)"/>
  <text x="140" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">sys_user</text>

  <rect x="210" y="420" width="100" height="50" rx="8" fill="url(#orange)"/>
  <text x="260" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">sys_club</text>

  <rect x="330" y="420" width="120" height="50" rx="8" fill="url(#orange)"/>
  <text x="390" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">sys_activity</text>

  <rect x="470" y="420" width="110" height="50" rx="8" fill="url(#orange)"/>
  <text x="525" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">sys_apply</text>

  <rect x="600" y="420" width="130" height="50" rx="8" fill="url(#orange)"/>
  <text x="665" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">sys_payment</text>

  <rect x="750" y="420" width="70" height="50" rx="8" fill="url(#orange)"/>
  <text x="785" y="448" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="white">...</text>

  <!-- Bottom note -->
  <text x="450" y="508" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">图 3-1 系统架构图</text>
</svg>
