<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="url(#bg2)" rx="12"/>
  <text x="480" y="35" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">系统用例图</text>

  <!-- System boundary -->
  <rect x="200" y="60" width="560" height="520" rx="16" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="480" y="85" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#64748b">高校社团管理与活动预约平台</text>

  <!-- ===== Actors ===== -->
  <!-- Admin -->
  <circle cx="70" cy="160" r="20" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="70" y1="180" x2="70" y2="220" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="50" y1="195" x2="90" y2="195" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="70" y1="220" x2="50" y2="250" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="70" y1="220" x2="90" y2="250" stroke="#ef4444" stroke-width="2.5"/>
  <text x="70" y="270" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ef4444">管理员</text>

  <!-- President -->
  <circle cx="70" cy="360" r="20" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="70" y1="380" x2="70" y2="420" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="50" y1="395" x2="90" y2="395" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="70" y1="420" x2="50" y2="450" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="70" y1="420" x2="90" y2="450" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="70" y="470" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6">社长</text>

  <!-- User -->
  <circle cx="890" cy="360" r="20" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <line x1="890" y1="380" x2="890" y2="420" stroke="#10b981" stroke-width="2.5"/>
  <line x1="870" y1="395" x2="910" y2="395" stroke="#10b981" stroke-width="2.5"/>
  <line x1="890" y1="420" x2="870" y2="450" stroke="#10b981" stroke-width="2.5"/>
  <line x1="890" y1="420" x2="910" y2="450" stroke="#10b981" stroke-width="2.5"/>
  <text x="890" y="470" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#10b981">普通用户</text>

  <!-- ===== Use Cases (ellipses) ===== -->
  <!-- Row 1 -->
  <ellipse cx="320" cy="130" rx="80" ry="24" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="135" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">用户管理</text>

  <ellipse cx="480" cy="130" rx="80" ry="24" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="135" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">社团审核</text>

  <ellipse cx="640" cy="130" rx="90" ry="24" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="135" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">社团类型管理</text>

  <!-- Row 2 -->
  <ellipse cx="280" cy="210" rx="70" ry="24" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="215" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">活动管理</text>

  <ellipse cx="440" cy="210" rx="80" ry="24" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="440" y="215" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">活动审核</text>

  <ellipse cx="600" cy="210" rx="70" ry="24" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="215" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">入团审核</text>

  <ellipse cx="750" cy="210" rx="70" ry="24" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="215" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">成员管理</text>

  <!-- Row 3 -->
  <ellipse cx="300" cy="290" rx="70" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="300" y="295" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">发布通知</text>

  <ellipse cx="460" cy="290" rx="70" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="295" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">缴费管理</text>

  <ellipse cx="620" cy="290" rx="80" ry="24" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="295" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">社长转移</text>

  <!-- Row 4 -->
  <ellipse cx="320" cy="370" rx="80" ry="24" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="375" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">创建社团</text>

  <ellipse cx="480" cy="370" rx="80" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="375" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">申请入团</text>

  <ellipse cx="640" cy="370" rx="80" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="375" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">报名活动</text>

  <!-- Row 5 -->
  <ellipse cx="360" cy="450" rx="70" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="360" y="455" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">活动签到</text>

  <ellipse cx="520" cy="450" rx="70" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="520" y="455" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">在线缴费</text>

  <ellipse cx="680" cy="450" rx="80" ry="24" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="680" y="455" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">查看通知</text>

  <!-- Row 6 -->
  <ellipse cx="440" cy="530" rx="90" ry="24" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="440" y="535" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">查看数据看板</text>

  <ellipse cx="620" cy="530" rx="80" ry="24" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="535" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#1e293b">查看系统日志</text>

  <!-- ===== Lines: Admin → Use Cases ===== -->
  <line x1="90" y1="160" x2="240" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="170" x2="400" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="180" x2="550" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="200" x2="210" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="210" x2="360" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="230" x2="230" y2="290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="240" x2="540" y2="290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="250" x2="540" y2="530" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- ===== Lines: President → Use Cases ===== -->
  <line x1="90" y1="350" x2="240" y2="370" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="370" x2="210" y2="210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="390" x2="520" y2="210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="400" x2="670" y2="210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="410" x2="230" y2="290" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="420" x2="390" y2="290" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="430" x2="360" y2="450" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="90" y1="440" x2="360" y2="530" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- ===== Lines: User → Use Cases ===== -->
  <line x1="870" y1="350" x2="400" y2="370" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="870" y1="370" x2="560" y2="370" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="870" y1="400" x2="610" y2="450" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="870" y1="420" x2="450" y2="450" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="870" y1="430" x2="600" y2="450" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="870" y1="440" x2="360" y2="530" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Legend -->
  <circle cx="60" cy="580" r="8" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="75" y="585" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#64748b">管理员专属</text>
  <circle cx="180" cy="580" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="195" y="585" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#64748b">社长专属</text>
  <circle cx="290" cy="580" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="305" y="585" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#64748b">普通用户</text>
  <circle cx="400" cy="580" r="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <text x="415" y="585" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#64748b">所有角色</text>

  <text x="480" y="610" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#94a3b8">图 3-2 系统用例图</text>
</svg>
